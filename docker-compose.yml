version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: photobooth_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-photobooth}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: photobooth_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: photobooth_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-photobooth}?schema=public
      REDIS_URL: redis://redis:6379
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN}
      BOOTH_AUTH_TOKEN: ${BOOTH_AUTH_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"
      - "3001:3001" # WebSocket
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
